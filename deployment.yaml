apiVersion: apps/v1
kind: Deployment
metadata:
  name: vite-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vite-app
  template:
    metadata:
      labels:
        app: vite-app
    spec:
      containers:
      - name: vite-app
        image: vite-k8s-local:local
        imagePullPolicy: Never
        # Note: The pipeline will update this tag automatically
        # image: your-docker-username/vite-app:latest
        ports:
        - containerPort: 80